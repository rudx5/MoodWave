<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rate Your Mood</title>
    <link rel="stylesheet" href="rate.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=League+Spartan&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=League+Spartan:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <h1>How are you feeling today?</h1>
      <div class="rating-options">
        <!-- Mood rating buttons 1–10 -->
        <button class="circle" data-value="1">1</button>
        <button class="circle" data-value="2">2</button>
        <button class="circle" data-value="3">3</button>
        <button class="circle" data-value="4">4</button>
        <button class="circle" data-value="5">5</button>
        <button class="circle" data-value="6">6</button>
        <button class="circle" data-value="7">7</button>
        <button class="circle" data-value="8">8</button>
        <button class="circle" data-value="9">9</button>
        <button class="circle" data-value="10">10</button>
      </div>
      <button id="nextButton" disabled>Next</button>
    </div>

    <script src="rate.js"></script>
  </body>
</html>
